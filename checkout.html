<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Grissenda Euphorias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        luxury: {
                            50: '#fdf8f6', 100: '#f2e8e5', 200: '#eaddd7', 300: '#e0cec7',
                            400: '#d2bab0', 500: '#bfa094', 600: '#a18072', 700: '#977669',
                            800: '#846358', 900: '#43302b',
                        }
                    },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-luxury-50 text-luxury-900 font-sans">
    <nav class="bg-white/80 backdrop-blur-md border-b border-luxury-100 fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-4">
            <a href="index.html" class="inline-flex items-center space-x-2">
                <i data-lucide="flower-2" class="h-6 w-6 text-luxury-600"></i>
                <span class="text-lg font-serif font-bold tracking-tight">Grissenda <span class="text-luxury-500">Euphorias</span></span>
            </a>
            <div class="flex items-center space-x-6">
                <a href="login.html" class="text-luxury-400 hover:text-luxury-600 relative">
                    <i data-lucide="user" class="h-5 w-5"></i>
                </a>
                <a href="login.html" class="bg-luxury-900 text-white px-4 py-2 rounded-md text-xs font-medium">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-24">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="checkout-container" class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- Left: Forms -->
                <div class="space-y-8">
                    <!-- Shipping Address -->
                    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-luxury-50">
                        <h3 class="text-xl font-serif font-bold mb-6 flex items-center space-x-3">
                            <i data-lucide="map-pin" class="h-5 w-5 text-luxury-500"></i>
                            <span>Shipping Destination</span>
                        </h3>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" placeholder="First Name" class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200">
                                <input type="text" placeholder="Last Name" class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200">
                            </div>
                            <input type="text" placeholder="Street Address" class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" placeholder="City" class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200">
                                <input type="text" placeholder="Postal Code" class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200">
                            </div>
                            <select class="w-full bg-luxury-50 border border-luxury-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-luxury-200 appearance-none">
                                <option>KwaZulu-Natal</option>
                                <option>Gauteng</option>
                                <option>Western Cape</option>
                                <option>Eastern Cape</option>
                            </select>
                        </div>
                    </div>

                    <!-- Payment Method -->
                    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-luxury-50">
                        <h3 class="text-xl font-serif font-bold mb-6 flex items-center space-x-3">
                            <i data-lucide="credit-card" class="h-5 w-5 text-luxury-500"></i>
                            <span>Secure Payment</span>
                        </h3>
                        
                        <div class="space-y-4">
                            <!-- Card Option -->
                            <label class="relative flex items-center p-4 border-2 border-luxury-900 rounded-2xl cursor-pointer bg-luxury-50">
                                <input type="radio" name="payment" checked class="hidden">
                                <div class="flex items-center space-x-4">
                                    <div class="bg-white p-2 rounded-lg border border-luxury-100"><i data-lucide="credit-card" class="h-5 w-5 text-luxury-600"></i></div>
                                    <div>
                                        <div class="font-bold text-sm">Credit or Debit Card</div>
                                        <div class="text-[10px] text-gray-400 uppercase tracking-widest">Visa, Mastercard, Amex</div>
                                    </div>
                                </div>
                                <div class="ml-auto"><i data-lucide="check-circle-2" class="h-5 w-5 text-luxury-900"></i></div>
                            </label>

                            <!-- Card Details -->
                            <div class="p-6 bg-luxury-50 rounded-2xl space-y-4">
                                <input type="text" placeholder="Card Number" class="w-full bg-white border border-luxury-100 rounded-xl px-4 py-3 text-sm">
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" placeholder="MM / YY" class="w-full bg-white border border-luxury-100 rounded-xl px-4 py-3 text-sm">
                                    <input type="text" placeholder="CVV" class="w-full bg-white border border-luxury-100 rounded-xl px-4 py-3 text-sm">
                                </div>
                            </div>

                            <!-- EFT Option -->
                            <label class="flex items-center p-4 border border-luxury-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-all">
                                <input type="radio" name="payment" class="hidden">
                                <div class="flex items-center space-x-4">
                                    <div class="bg-white p-2 rounded-lg border border-luxury-100"><i data-lucide="landmark" class="h-5 w-5 text-gray-400"></i></div>
                                    <div>
                                        <div class="font-bold text-sm text-gray-600">Instant EFT</div>
                                        <div class="text-[10px] text-gray-400 uppercase tracking-widest">Pay via your bank</div>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Right: Summary -->
                <div class="lg:sticky lg:top-24 h-fit">
                    <div class="bg-luxury-900 text-white p-10 rounded-[40px] shadow-xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-white/5 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                        
                        <h3 class="text-2xl font-serif font-bold mb-8">Order Summary</h3>
                        
                        <div id="checkout-items" class="space-y-6 mb-10 border-b border-white/10 pb-8">
                            <!-- Items Injected by JS -->
                        </div>

                        <div class="space-y-4 mb-10">
                            <div class="flex justify-between text-luxury-200 text-sm">
                                <span>Subtotal</span>
                                <span id="summary-subtotal">R 0</span>
                            </div>
                            <div class="flex justify-between text-luxury-200 text-sm">
                                <span>Delivery (KZN)</span>
                                <span class="text-green-400 font-bold">FREE</span>
                            </div>
                            <div class="flex justify-between text-xl font-serif font-bold pt-4 border-t border-white/10">
                                <span>Total</span>
                                <span id="summary-total">R 0</span>
                            </div>
                        </div>

                        <button onclick="processPayment()" id="pay-btn" class="w-full bg-white text-luxury-900 py-5 rounded-2xl font-bold shadow-lg hover:bg-luxury-50 transition-all flex items-center justify-center space-x-3 group">
                            <i data-lucide="shield-check" class="h-5 w-5"></i>
                            <span>Complete Purchase</span>
                        </button>
                        
                        <div class="mt-6 flex items-center justify-center space-x-4 opacity-50">
                            <i data-lucide="lock" class="h-3 w-3"></i>
                            <span class="text-[10px] uppercase tracking-[0.2em]">AES-256 Encrypted Payment</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Success State (Hidden) -->
            <div id="success-state" class="hidden text-center py-20 animate-in fade-in zoom-in duration-700">
                <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-8">
                    <i data-lucide="check" class="h-12 w-12 text-green-600"></i>
                </div>
                <h2 class="text-4xl font-serif font-bold mb-4">Payment Successful!</h2>
                <p class="text-luxury-400 mb-12 max-w-md mx-auto">Thank you for choosing Grissenda Euphorias. Your luxury fragrance is being prepared for dispatch.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                    <a href="dashboard.html" class="bg-luxury-900 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center space-x-3">
                        <i data-lucide="truck" class="h-5 w-5"></i>
                        <span>Track My Order</span>
                    </a>
                    <a href="index.html" class="bg-white border border-luxury-100 text-luxury-900 py-4 rounded-2xl font-bold flex items-center justify-center space-x-3">
                        <i data-lucide="home" class="h-5 w-5"></i>
                        <span>Back to Home</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        function renderSummary() {
            const container = document.getElementById('checkout-items');
            const subtotalEl = document.getElementById('summary-subtotal');
            const totalEl = document.getElementById('summary-total');
            
            if (cart.length === 0) {
                window.location.href = 'shop.html';
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-xl overflow-hidden border border-white/10">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <div class="text-xs font-bold">${item.name}</div>
                                <div class="text-[10px] text-luxury-300">Qty: ${item.quantity}</div>
                            </div>
                        </div>
                        <div class="text-xs font-bold">R ${(item.price * item.quantity).toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            subtotalEl.textContent = `R ${total.toLocaleString()}`;
            totalEl.textContent = `R ${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function processPayment() {
            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-luxury-900 border-t-transparent rounded-full animate-spin"></div><span>Verifying...</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<div class="w-5 h-5 border-2 border-luxury-900 border-t-transparent rounded-full animate-spin"></div><span>Securing Funds...</span>';
                setTimeout(() => {
                    document.getElementById('checkout-container').classList.add('hidden');
                    document.getElementById('success-state').classList.remove('hidden');
                    cart = [];
                    saveCart();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 2000);
            }, 1500);
        }

        renderSummary();
        lucide.createIcons();
    </script>
</body>
</html>
